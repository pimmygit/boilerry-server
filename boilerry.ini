[DEFAULT]
level = INFO
file = stdout
temp_record_interval = 60
port = 9741
max_invalid_requests = 3
min_days_history = 1

[logging]
level = FINEST
file = runtime.log

[weather]
api = open-meteo
# GIS location of the weather station to use (Example is Teddington(UK) observation station)
latitude = 51.4167
longitude = -0.3333
# Units to measure the wind speed and temperatures. As this is used for analytics,
# the measuring unit doesnt really matter as long as it is not changed as it may affect the predictions.
# Options: speed[kph|mph], temperature[C|F]
unit_speed = kph
unit_temperature = C
# If there is no record in the database yet, lets start with the minimum history specified in the Config file.
min_days_history = 1
# We want to avoid hitting the API too often, hence we impose a minimum time period before we can send a request again.
# The weather station would unlikely return anything for a period of less than two hours anyway, hence this is the default.
min_hours_since_last_record = 2
# Periodic retrieval of the weather to avoid retrieval of large weather history period which can take long time.
# For example: 6 -> 6:00am
time_to_retrieve_weather_history = 06:00:00

[temperature.sensor]
sensor_1_id = 28-0416a4e258ff
sensor_1_timeout = 30
sensor_2_id =
sensor_2_timeout =
sensor_3_id =
sensor_3_timeout =

[pin.gpio]
# The GPIO pin/port on which the PIR sensor or the relays are connected to
motion_1 = 13
relay_1 = 16
relay_2 = 18

[android.server]
host =
port = 9741
max_invalid_requests = 5

################################################################################
# Below are all the user configurations to the heating system control
# that they can do via the App UI.
################################################################################
[boilerry.server]
# State of the boiler:
#     0 - Off
#     1 - Always On, maintaining the temperature as set in the 'thermostat' table for the period (00:00 to 23:59)
#     2 - Timer On, maintaining the temperature as set in 'thermostat' table, defaulting to period (00:00 to 23:59).
#     3 - Predictive.
thermo_switch = 1

# Temperature units: [F]ahrenheit, or [C]elsuis.
temp_units = C

# Intervals between temperature recordings in minutes
temp_record_interval = 30

# Period of no motion in the property in minutes, that is considered that the occupants are not present.
# The predictive schedule differentiates when people are asleep at night, and not in the property using the time.
motion_period_no_occupants = 30

# The period between each recording of movement in minutes. There is no need to write in the database too often.
# This property in combination with what we observe as `motion_period_no_occupants` can give us accurate enough
# information when a person has left the property.
motion_time_between_writes = 10
